
    <div style="background:black; color:white; padding:10px;">
        <h3>My Store</h3>
    </div>

    
    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
        }

        h2 {
            text-align: center;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: white;
            width: 250px;
            margin: 15px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 8px;
        }

        .btn {
            display: inline-block;
            padding: 10px;
            background: green;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 10px;
        }

        .btn:hover {
            background: darkgreen;
        }
    </style>
</head>

<body>

    <h2> My Store</h2>

    <div class="container">
        {% for product in products %}
        <div class="card">
            <img src="{{ product.image.url }}" alt="">
            <h3>{{ product.name }}</h3>
            <p>₹ {{ product.price }}</p>
            <a href="{% url 'add_to_cart' product.id %}" class="btn">Add to Cart</a>
        </div>
        {% endfor %}
    </div>

</body>
<div class="main-container">

    <h1 class="title">Footwear Collection</h1>

    <!-- Banner -->
    <div class="banner">
        <h2> Big Sale - Up to 50% OFF</h2>
    </div>

    <!-- Product Grid -->
    <div class="product-container">
        {% for product in products %}
        <div class="product-card">
            <div class="slider">
                <div class="slides">
                    <img src="https://via.placeholder.com/1200x300?text=Big+Sale+1">
                    <img src="https://via.placeholder.com/1200x300?text=New+Arrivals">
                    <img src="https://via.placeholder.com/1200x300?text=Best+Offers">
                </div>
                <div class="categories">
                    <div class="cat"> Shoes</div>
                    <div class="cat"> Sandals</div>
                    <div class="cat"> Heels</div>
                    <div class="cat"> Flats</div>
                </div>
            </div>

            <img src="{{ product.image.url }}" alt="{{ product.name }}">

            <h3>{{ product.name }}</h3>
            <p class="price">₹{{ product.price }}</p>

            <a href="{% url 'add_to_cart' product.id %}" class="btn">Add to Cart</a>

        </div>
        {% endfor %}
    </div>

</div>

</html>
